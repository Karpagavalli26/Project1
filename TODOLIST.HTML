<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
}

.container {
    width: 380px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(152, 142, 142, 0.2);
    text-align: center;
}

h2 {
    margin-bottom: 15px;
    color: #333;
}

.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    outline: none;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
}

button {
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #454242;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #757575;
    transform: scale(1.05);
}
ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: white;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

li:hover {
    transform: translateX(5px);
}

.task {
    cursor: pointer;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.delete {
    color: red;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>📋To-Do List</h2>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value.trim();

    if (text === "") return;

    let li = document.createElement("li");

    li.innerHTML = `
        <span class="task" onclick="toggle(this)">${text}</span>
        <span class="delete" onclick="removeTask(this)">✖</span>
    `;

    document.getElementById("taskList").appendChild(li);
    input.value = "";
}

function toggle(el) {
    el.classList.toggle("done");
}

function removeTask(el) {
    el.parentElement.remove();
}
</script>

</body>
</html>
