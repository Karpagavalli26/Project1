<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
      .container {
            background: white;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            color: #333;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        li {
            list-style: none;
            padding: 10px;
            margin: 5px;
            background: #eee;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>
<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        let task = input.value;

        if (task === "") {
            alert("Please enter a task");
            return;
        }
        let li = document.createElement("li");
        li.innerHTML = task + 
            " <button class='delete' onclick='removeTask(this)'>X</button>";

        document.getElementById("taskList").appendChild(li);
        input.value = "";
    }
    function removeTask(btn) {
        btn.parentElement.remove();
    }
</script>

</body>
</html>
