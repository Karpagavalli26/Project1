<!DOCTYPE html>
<html>
<head>
<title>User Directory</title>
<style>
body {
    font-family: Arial;
    background: #f4f0f0;
    text-align: center;
}
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.card {
    background: rgb(237, 233, 233);
    border: 1px solid #ccc;
    padding: 10px;
    margin: 10px;
    width: 220px;
    text-align: left;
}
</style>
</head>
<body>
<h2>User Directory</h2>
<input type="text" id="search" placeholder="Search name">
<button onclick="sortAZ()">A-Z</button>
<button onclick="sortZA()">Z-A</button>
<div class="container" id="users"></div>
<script>
const users = [
    {name:"Ramya", email:"ramya@mail.com", phone:"9876543210", company:"ABC Ltd"},
    {name:"Bala", email:"bala@mail.com", phone:"9123456780", company:"XYZ Corp"},
    {name:"Charan", email:"charan@mail.com", phone:"9012345678", company:"TechSoft"},
    {name:"Divya", email:"divya@mail.com", phone:"8899776655", company:"InfoSys"},
    {name:"Esha", email:"esha@mail.com", phone:"7788996655", company:"SmartTech"}
];
function showUsers(list) {
    const box = document.getElementById("users");
    box.innerHTML = "";
    list.forEach(u => {
        box.innerHTML += `
            <div class="card">
                <h4>${u.name}</h4>
                <p>Email: ${u.email}</p>
                <p>Phone: ${u.phone}</p>
                <p>Company: ${u.company}</p>
            </div>
        `;
    });
}
function sortAZ() {
    users.sort((a,b) => a.name.localeCompare(b.name));
    showUsers(users);
}
function sortZA() {
    users.sort((a,b) => b.name.localeCompare(a.name));
    showUsers(users);
}
document.getElementById("search").oninput = function() {
    let val = this.value.toLowerCase();
    let filtered = users.filter(u => u.name.toLowerCase().includes(val));
    showUsers(filtered);
};
showUsers(users);
</script>
</body>
</html>
